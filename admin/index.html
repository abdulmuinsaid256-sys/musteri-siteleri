<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Kastamonu Esnaf — Admin Panel</title>
    <meta name="description" content="Kastamonu Esnaf Admin Panel">
    <meta name="robots" content="noindex,nofollow">
    <link rel="icon" href="../muinweblogo.webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --surface2: #1e293b;
            --border: #1e293b;
            --text: #e2e8f0;
            --text2: #94a3b8;
            --accent: #6366f1;
            --accent2: #818cf8;
            --green: #22c55e;
            --red: #ef4444;
            --orange: #f59e0b;
            --yellow: #eab308;
            --cyan: #06b6d4;
            --radius: 16px
        }

        :root.light-theme {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface2: #f1f5f9;
            --border: #e2e8f0;
            --text: #0f172a;
            --text2: #64748b;
            --accent: #4f46e5;
            --accent2: #6366f1;
        }

        html {
            scroll-behavior: smooth
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden
        }

        ::selection {
            background: var(--accent);
            color: #fff
        }

        ::-webkit-scrollbar {
            width: 6px
        }

        ::-webkit-scrollbar-track {
            background: var(--bg)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--surface2);
            border-radius: 3px
        }

        .header {
            background: linear-gradient(135deg, rgba(99, 102, 241, .15), rgba(139, 92, 246, .1));
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px)
        }

        .header-inner {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #fff;
            font-weight: 900
        }

        .logo h1 {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -.5px
        }

        .logo h1 span {
            color: var(--accent2);
            font-weight: 600
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .header-badge {
            font-size: 11px;
            color: var(--text2);
            background: var(--surface2);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500
        }

        .theme-toggle {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            width: 28px;
            height: 28px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .api-status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px
        }

        .api-status.online {
            background: rgba(34, 197, 94, .15);
            color: var(--green)
        }

        .api-status.offline {
            background: rgba(239, 68, 68, .1);
            color: var(--red)
        }

        .tab-btns {
            display: flex;
            gap: 4px
        }

        .tab-btn {
            padding: 8px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text2);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .tab-btn.active,
        .tab-btn:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent)
        }

        .stats {
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
            transition: all .3s ease
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            box-shadow: 0 8px 30px rgba(99, 102, 241, .15)
        }

        .stat-value {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent2), #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .stat-card.green .stat-value {
            background: linear-gradient(135deg, var(--green), #4ade80);
            -webkit-background-clip: text;
            background-clip: text
        }

        .stat-card.orange .stat-value {
            background: linear-gradient(135deg, var(--orange), #fbbf24);
            -webkit-background-clip: text;
            background-clip: text
        }

        .stat-card.red .stat-value {
            background: linear-gradient(135deg, var(--red), #f87171);
            -webkit-background-clip: text;
            background-clip: text
        }

        .stat-card.cyan .stat-value {
            background: linear-gradient(135deg, var(--cyan), #22d3ee);
            -webkit-background-clip: text;
            background-clip: text
        }

        .stat-label {
            font-size: 11px;
            color: var(--text2);
            margin-top: 4px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .5px
        }

        .toolbar {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 24px 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center
        }

        .search-box {
            flex: 1;
            min-width: 260px;
            position: relative
        }

        .search-box input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px 12px 44px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            transition: border-color .3s
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, .15)
        }

        .search-box input::placeholder {
            color: var(--text2)
        }

        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text2);
            font-size: 14px
        }

        .filter-select {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            min-width: 160px
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--accent)
        }

        .view-btns {
            display: flex;
            gap: 4px
        }

        .view-btn {
            width: 40px;
            height: 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s
        }

        .view-btn.active,
        .view-btn:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent)
        }

        .result-count {
            font-size: 13px;
            color: var(--text2);
            white-space: nowrap
        }

        .main {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 24px 40px
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px
        }

        .grid.list-view {
            grid-template-columns: 1fr
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            cursor: pointer;
            transition: all .3s ease;
            position: relative;
            overflow: hidden
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
            box-shadow: 0 12px 40px rgba(99, 102, 241, .12)
        }

        .card.satildi {
            border-color: rgba(34, 197, 94, .3);
            background: linear-gradient(135deg, var(--surface), rgba(34, 197, 94, .05))
        }

        .card.takipte {
            border-color: rgba(234, 179, 8, .2)
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px
        }

        .card-avatar {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--surface2)
        }

        .card-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .card-avatar.no-img {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.15);
            background: linear-gradient(135deg, var(--avatar-c1, #6366f1), var(--avatar-c2, #a855f7));
        }

        .card-info {
            flex: 1;
            min-width: 0
        }

        .card-name {
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .card-category {
            font-size: 11px;
            color: var(--text2);
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 4px
        }

        .card-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 10px
        }

        .badge {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px
        }

        .badge.ready {
            background: rgba(34, 197, 94, .12);
            color: var(--green);
            border: 1px solid rgba(34, 197, 94, .2)
        }

        .badge.not-ready {
            background: rgba(239, 68, 68, .1);
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, .15)
        }

        .badge.has-web {
            background: rgba(59, 130, 246, .1);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, .15)
        }

        .badge.has-phone {
            background: rgba(245, 158, 11, .1);
            color: var(--orange);
            border: 1px solid rgba(245, 158, 11, .15)
        }

        .badge.sold {
            background: rgba(34, 197, 94, .15);
            color: var(--green);
            border: 1px solid rgba(34, 197, 94, .3)
        }

        .badge.tracking {
            background: rgba(234, 179, 8, .12);
            color: var(--yellow);
            border: 1px solid rgba(234, 179, 8, .2)
        }

        .badge.asked {
            background: rgba(6, 182, 212, .12);
            color: var(--cyan);
            border: 1px solid rgba(6, 182, 212, .2)
        }

        .card-meta {
            display: flex;
            gap: 12px;
            font-size: 11px;
            color: var(--text2)
        }

        .card-meta span {
            display: flex;
            align-items: center;
            gap: 4px
        }

        .card-addr {
            font-size: 11px;
            color: var(--text2);
            margin-top: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .grid.list-view .card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 20px
        }

        .grid.list-view .card-header {
            margin-bottom: 0;
            flex: 1
        }

        .grid.list-view .card-badges {
            margin-bottom: 0
        }

        .grid.list-view .card-addr {
            display: none
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            backdrop-filter: blur(8px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px
        }

        .modal-overlay.open {
            display: flex
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 760px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            animation: modalIn .3s ease
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(.95) translateY(10px)
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0)
            }
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            background: var(--surface2);
            border: none;
            border-radius: 10px;
            color: var(--text2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 10;
            transition: all .2s
        }

        .modal-close:hover {
            background: var(--red);
            color: #fff
        }

        .modal-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
            padding: 20px
        }

        .modal-gallery img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
            transition: transform .3s
        }

        .modal-gallery img:hover {
            transform: scale(1.05)
        }

        .modal-body {
            padding: 0 24px 24px
        }

        .modal-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 4px
        }

        .modal-cat {
            font-size: 13px;
            color: var(--accent2);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .modal-section {
            margin-bottom: 20px
        }

        .modal-section h3 {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--text2);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .modal-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px
        }

        .modal-info-item {
            background: var(--surface2);
            border-radius: 12px;
            padding: 12px;
            font-size: 13px
        }

        .modal-info-item label {
            display: block;
            font-size: 10px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 4px;
            font-weight: 600
        }

        .modal-info-item a {
            color: var(--accent2);
            text-decoration: none
        }

        .modal-info-item a:hover {
            text-decoration: underline
        }

        .hours-grid {
            display: grid;
            gap: 4px
        }

        .hour-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 12px;
            background: var(--surface2);
            border-radius: 8px;
            font-size: 12px
        }

        .hour-row .day {
            font-weight: 600
        }

        .hour-row .time {
            color: var(--accent2)
        }

        .hour-row .closed {
            color: var(--red)
        }

        .review-card {
            background: var(--surface2);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 8px
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px
        }

        .review-author {
            font-weight: 600;
            font-size: 13px
        }

        .review-stars {
            color: var(--orange);
            font-size: 11px
        }

        .review-text {
            font-size: 12px;
            color: var(--text2);
            line-height: 1.5
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 16px
        }

        .modal-btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all .2s;
            font-family: inherit;
            text-decoration: none
        }

        .modal-btn.primary {
            background: var(--accent);
            color: #fff
        }

        .modal-btn.primary:hover {
            background: var(--accent2)
        }

        .modal-btn.whatsapp {
            background: #22c55e;
            color: #fff
        }

        .modal-btn.whatsapp:hover {
            background: #16a34a
        }

        .modal-btn.maps {
            background: var(--surface2);
            color: var(--text)
        }

        .modal-btn.maps:hover {
            background: var(--border)
        }

        .modal-btn.save {
            background: var(--green);
            color: #fff
        }

        .modal-btn.save:hover {
            background: #16a34a
        }

        /* EDIT FORM */
        .edit-form {
            background: linear-gradient(135deg, rgba(99, 102, 241, .08), rgba(139, 92, 246, .05));
            border: 1px solid rgba(99, 102, 241, .2);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 20px
        }

        .edit-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px
        }

        .edit-field label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--text2);
            font-weight: 600;
            display: block;
            margin-bottom: 4px
        }

        .edit-field select,
        .edit-field input,
        .edit-field textarea {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit
        }

        .edit-field select:focus,
        .edit-field input:focus,
        .edit-field textarea:focus {
            outline: none;
            border-color: var(--accent)
        }

        .edit-field textarea {
            resize: vertical;
            min-height: 60px
        }

        .save-indicator {
            font-size: 12px;
            color: var(--green);
            display: none;
            align-items: center;
            gap: 4px;
            margin-left: 8px
        }

        .save-indicator.show {
            display: inline-flex
        }

        /* LOG PANEL */
        .log-panel {
            display: none
        }

        .log-panel.active {
            display: block
        }

        .isletme-panel {
            display: block
        }

        .isletme-panel.hidden {
            display: none
        }

        .log-list {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 24px 40px
        }

        .log-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all .2s
        }

        .log-item:hover {
            border-color: var(--accent)
        }

        .log-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px
        }

        .log-icon.update {
            background: rgba(99, 102, 241, .15);
            color: var(--accent2)
        }

        .log-info {
            flex: 1;
            min-width: 0
        }

        .log-title {
            font-size: 13px;
            font-weight: 600
        }

        .log-detail {
            font-size: 11px;
            color: var(--text2);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .log-time {
            font-size: 11px;
            color: var(--text2);
            white-space: nowrap
        }

        .log-empty {
            text-align: center;
            padding: 60px;
            color: var(--text2)
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text2)
        }

        .loading i {
            font-size: 32px;
            color: var(--accent);
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
            display: block
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text2)
        }

        .empty i {
            font-size: 48px;
            margin-bottom: 16px;
            color: var(--surface2);
            display: block
        }

        .img-viewer {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .92);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: zoom-out
        }

        .img-viewer.open {
            display: flex
        }

        .img-viewer img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 12px;
            object-fit: contain
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--green);
            color: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            z-index: 400;
            display: none;
            align-items: center;
            gap: 8px;
            animation: slideUp .3s ease;
            box-shadow: 0 8px 30px rgba(0, 0, 0, .3)
        }

        .toast.show {
            display: flex
        }

        .toast.error {
            background: var(--red)
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @media(max-width:768px) {
            .header-inner {
                flex-direction: column;
                align-items: flex-start
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
                padding: 16px
            }

            .toolbar {
                padding: 0 16px 12px
            }

            .search-box {
                min-width: 100%
            }

            .grid {
                grid-template-columns: 1fr;
                padding: 0
            }

            .main {
                padding: 0 16px 40px
            }

            .modal-info-grid {
                grid-template-columns: 1fr
            }

            .edit-row {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>
    <!-- LOGIN OVERLAY -->
    <div id="authOverlay"
        style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;">
        <div style="text-align:center;">
            <div class="logo-icon" style="margin:0 auto 16px;width:64px;height:64px;font-size:28px;"><i
                    class="fas fa-lock"></i></div>
            <h2 style="margin-bottom:8px">Admin Girişi</h2>
            <p style="color:var(--text2);font-size:14px;margin-bottom:24px">Lütfen yönetici şifresini girin.</p>
        </div>
        <div style="display:flex;gap:10px;width:100%;max-width:300px;">
            <input type="password" id="authInput" placeholder="Şifre..."
                style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-family:inherit;font-size:16px;"
                onkeypress="if(event.key==='Enter') checkAuth()">
            <button onclick="checkAuth()"
                style="background:var(--accent);color:#fff;border:none;border-radius:12px;padding:0 20px;font-weight:600;cursor:pointer;transition:all .2s"><i
                    class="fas fa-arrow-right"></i></button>
        </div>
        <div id="authError" style="color:var(--red);font-size:13px;display:none;margin-top:8px;"><i
                class="fas fa-exclamation-circle"></i> Hatalı şifre!</div>
    </div>


    <header class="header">
        <div class="header-inner">
            <div class="logo" style="align-items: center; gap: 16px;">
                <img src="../muinweblogo.webp" alt="MuinWeb" style="height: 52px; width: auto;">
                <div>
                    <!-- <h1>Kastamonu Esnaf <span>Admin</span></h1> -->
                    <div style="display:flex; align-items:center; gap:8px; margin-top:2px;">
                        <span class="header-badge" id="updateTime">Yükleniyor...</span>
                        <button class="theme-toggle" id="themeToggle" title="Tema Değiştir"><i
                                class="fas fa-moon"></i></button>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <span class="api-status" id="apiStatus"><i class="fas fa-circle" style="font-size:8px"></i> Kontrol
                    ediliyor...</span>
                <div class="tab-btns">
                    <button class="tab-btn active" data-tab="isletme"><i class="fas fa-store"></i> İşletmeler</button>
                    <button class="tab-btn" data-tab="log"><i class="fas fa-history"></i> Log</button>
                    <a href="satis.html" class="tab-btn"
                        style="background:var(--green);color:#fff;border-color:var(--green);text-decoration:none"><i
                            class="fab fa-whatsapp"></i> Satış Ekranı</a>
                </div>
            </div>
        </div>
    </header>

    <section class="stats" id="statsGrid"></section>

    <!-- ISLETMELER TAB -->
    <div class="isletme-panel" id="isletmePanel">
        <section class="toolbar">
            <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput"
                    placeholder="İşletme adı veya adres ara..."></div>
            <select class="filter-select" id="categoryFilter">
                <option value="">Tüm Kategoriler</option>
            </select>
            <select class="filter-select" id="statusFilter">
                <option value="">Tüm Durumlar</option>
                <option value="ready">✅ Site Hazır</option>
                <option value="not-ready">❌ Site Hazır Değil</option>
                <option value="satildi">💰 Satıldı</option>
                <option value="takipte">📋 Takipte</option>
                <option value="fiyat-soruldu">💬 Fiyat Soruldu</option>
                <option value="has-phone">📞 Telefon Var</option>
                <option value="has-photo">📷 Fotoğraf Var</option>
            </select>
            <div class="view-btns">
                <button class="view-btn active" data-view="grid" title="Kart"><i class="fas fa-th-large"></i></button>
                <button class="view-btn" data-view="list" title="Liste"><i class="fas fa-list"></i></button>
            </div>
            <span class="result-count" id="resultCount"></span>
        </section>
        <main class="main">
            <div class="loading" id="loading"><i class="fas fa-spinner"></i>Veriler yükleniyor...</div>
            <div class="grid" id="grid"></div>
            <div class="empty" id="empty" style="display:none"><i class="fas fa-search"></i>
                <p>Sonuç bulunamadı.</p>
            </div>
        </main>
    </div>

    <!-- LOG TAB -->
    <div class="log-panel" id="logPanel">
        <div class="log-list" id="logList">
            <div class="log-empty" id="logEmpty"><i class="fas fa-history"
                    style="font-size:48px;margin-bottom:16px;display:block;color:var(--surface2)"></i>Henüz log kaydı
                yok.</div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
            <div class="modal-gallery" id="modalGallery"></div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <div class="img-viewer" id="imgViewer"><img id="imgViewerImg" src="" alt=""></div>
    <div class="toast" id="toast"></div>

    <script>
        const _k = "=UTN2YjbpVXb";

        function checkAuth() {
            const val = document.getElementById('authInput').value;
            const dec = atob(_k.split('').reverse().join(''));

            if (val === dec) {
                localStorage.setItem('admin_auth', 'true');
                document.getElementById('authOverlay').style.display = 'none';
                initApp();
            } else {
                document.getElementById('authError').style.display = 'block';
                document.getElementById('authInput').value = '';
                document.getElementById('authInput').focus();
            }
        }

        function verifyAuthOnLoad() {
            if (localStorage.getItem('admin_auth') === 'true') {
                document.getElementById('authOverlay').style.display = 'none';
                initApp();
            } else {
                document.getElementById('authInput').focus();
            }
        }

        let DATA = null, filteredData = [], currentView = 'grid', API_URL = '', API_ACTIVE = false, currentModalId = null;
        const $ = id => document.getElementById(id);

        function initApp() {
            detectAPI();
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    const t = b.dataset.tab;
                    $('isletmePanel').className = t === 'isletme' ? 'isletme-panel' : 'isletme-panel hidden';
                    $('logPanel').className = t === 'log' ? 'log-panel active' : 'log-panel';
                    if (t === 'isletme') filterAndRender();
                };
            });

            document.querySelectorAll('.view-btn').forEach(b => {
                b.onclick = () => {
                    document.querySelectorAll('.view-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    currentView = b.dataset.view;
                    $('grid').className = currentView === 'list' ? 'grid list-view' : 'grid';
                };
            });

            // Filter Events
            $('searchInput').oninput = filterAndRender;
            $('categoryFilter').onchange = filterAndRender;
            $('statusFilter').onchange = filterAndRender;

            // Modal & Global Events
            $('modalClose').onclick = closeModal;
            $('modalOverlay').onclick = e => { if (e.target === $('modalOverlay') || e.target.classList.contains('img-viewer')) closeModal(); };
            $('grid').onclick = e => { const c = e.target.closest('.card'); if (c) openModal(parseInt(c.dataset.id)); };
            $('imgViewer').onclick = function (e) { if (e.target === this) this.classList.remove('open'); };

            // Theme Toggle
            if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('light-theme');
            $('themeToggle').onclick = () => {
                document.documentElement.classList.toggle('light-theme');
                localStorage.setItem('theme', document.documentElement.classList.contains('light-theme') ? 'light' : 'dark');
            };
        }

        // ============ API DETECTION ============
        async function detectAPI() {
            const urls = ['https://api.kastamonuesnaf.com.tr', 'http://localhost:5000', 'http://127.0.0.1:5000'];
            // Check if custom API URL is set
            const saved = localStorage.getItem('api_url');
            if (saved) urls.unshift(saved);

            for (const url of urls) {
                try {
                    const r = await fetch(url + '/api/health', { signal: AbortSignal.timeout(2000) });
                    if (r.ok) { API_URL = url; API_ACTIVE = true; break; }
                } catch (e) { }
            }
            updateAPIStatus();
        }

        function updateAPIStatus() {
            const el = $('apiStatus');
            if (API_ACTIVE) {
                el.className = 'api-status online';
                el.innerHTML = '<i class="fas fa-circle" style="font-size:8px"></i> API Aktif';
            } else {
                el.className = 'api-status offline';
                el.innerHTML = '<i class="fas fa-circle" style="font-size:8px"></i> Sadece Okunur';
            }
        }

        // ============ DATA LOADING ============
        async function loadData() {
            try {
                let r;
                if (API_ACTIVE) {
                    r = await fetch(API_URL + '/api/data');
                } else {
                    r = await fetch('data.json');
                }
                if (!r.ok) throw new Error('Veri yuklenemedi');
                DATA = await r.json();
                renderStats(); renderCategories(); filterAndRender();
                $('loading').style.display = 'none';
                $('updateTime').textContent = 'Son: ' + DATA.istatistikler.guncelleme_tarihi;
                if (API_ACTIVE) loadLogs();
            } catch (e) {
                $('loading').innerHTML = '<i class="fas fa-exclamation-triangle" style="color:var(--red);animation:none"></i><p>Veri yuklenemedi!<br><small>python admin_veri_uretici.py calistirin veya API sunucuyu baslattin.</small></p>';
            }
        }

        // ============ STATS ============
        function renderStats() {
            const s = DATA.istatistikler;
            const cards = [
                { v: s.toplam_isletme, l: 'Toplam', c: '' },
                { v: s.toplam_kategori, l: 'Kategori', c: '' },
                { v: s.site_hazir, l: 'Site Hazır', c: 'green' },
                { v: s.site_hazir_degil, l: 'Hazır Değil', c: 'red' },
                { v: s.satilan || 0, l: 'Satıldı', c: 'green' },
                { v: s.takipte || 0, l: 'Takipte', c: 'cyan' },
                { v: s.telefon_var, l: 'Telefon Var', c: 'orange' },
                { v: s.toplam_fotograf, l: 'Fotoğraf', c: '' },
                { v: s.toplam_yorum, l: 'Yorum', c: '' },
                { v: s.web_sitesi_var, l: 'Web Sitesi', c: 'orange' }
            ];
            $('statsGrid').innerHTML = cards.map(c => `<div class="stat-card ${c.c}"><div class="stat-value">${(c.v || 0).toLocaleString('tr-TR')}</div><div class="stat-label">${c.l}</div></div>`).join('');
        }

        function renderCategories() {
            const sel = $('categoryFilter');
            DATA.kategoriler.forEach(k => { const o = document.createElement('option'); o.value = k.ad; o.textContent = `${k.ad} (${k.sayi})`; sel.appendChild(o); });
        }

        // ============ FILTER ============
        function filterAndRender() {
            const q = $('searchInput').value.toLowerCase().trim();
            const cat = $('categoryFilter').value;
            const status = $('statusFilter').value;
            filteredData = DATA.isletmeler.filter(i => {
                if (q && !i.isletme_adi.toLowerCase().includes(q) && !(i.adres || '').toLowerCase().includes(q)) return false;
                if (cat && i.kategori !== cat) return false;
                if (status === 'ready' && !i.site_hazir) return false;
                if (status === 'not-ready' && i.site_hazir) return false;
                if (status === 'satildi' && !i.satildi) return false;
                if (status === 'takipte' && i.durum !== 'Takipte') return false;
                if (status === 'fiyat-soruldu' && i.durum !== 'Fiyat Soruldu') return false;
                if (status === 'has-phone' && (!i.telefon || i.telefon === '-')) return false;
                if (status === 'has-photo' && i.fotograf_sayisi === 0) return false;
                return true;
            });
            $('resultCount').textContent = filteredData.length + ' / ' + DATA.isletmeler.length + ' isletme';
            renderGrid();
        }

        function getInitials(n) { return n.split(/\\s+/).slice(0, 2).map(w => w[0]).join('').toUpperCase(); }

        const avatarColors = [
            ['#ef4444', '#b91c1c'], ['#f97316', '#c2410c'], ['#f59e0b', '#b45309'],
            ['#10b981', '#047857'], ['#06b6d4', '#0e7490'], ['#3b82f6', '#1d4ed8'],
            ['#6366f1', '#4338ca'], ['#8b5cf6', '#6d28d9'], ['#d946ef', '#a21caf'],
            ['#f43f5e', '#be123c']
        ];

        function getAvatarColors(id) {
            return avatarColors[id % avatarColors.length];
        }

        function getDurumBadge(i) {
            if (i.satildi) return '<span class="badge sold"><i class="fas fa-check-double"></i>Satıldı</span>';
            if (i.durum === 'Takipte') return '<span class="badge tracking"><i class="fas fa-clock"></i>Takipte</span>';
            if (i.durum === 'Fiyat Soruldu') return '<span class="badge asked"><i class="fas fa-comment-dollar"></i>Fiyat Soruldu</span>';
            return '';
        }

        function renderGrid() {
            const grid = $('grid');
            if (filteredData.length === 0) { grid.innerHTML = ''; $('empty').style.display = 'block'; return; }
            $('empty').style.display = 'none';

            const items = filteredData.slice(0, 200);

            grid.innerHTML = items.map(i => {
                const colors = getAvatarColors(i.id);
                const colorStyle = `--avatar-c1:${colors[0]}; --avatar-c2:${colors[1]}`;
                const avatar = i.fotograflar && i.fotograflar.length > 0
                    ? `<div class="card-avatar"><img src="${i.fotograflar[0]}" alt="" loading="lazy" onerror="this.parentElement.className='card-avatar no-img';this.parentElement.style='${colorStyle}';this.parentElement.innerHTML='${getInitials(i.isletme_adi)}'"></div>`
                    : `<div class="card-avatar no-img" style="${colorStyle}">${getInitials(i.isletme_adi)}</div>`;
                const cardClass = i.satildi ? 'card satildi' : i.durum === 'Takipte' ? 'card takipte' : 'card';

                return `<div class="${cardClass}" data-id="${i.id}">
      <div class="card-header">${avatar}<div class="card-info"><div class="card-name" title="${i.isletme_adi}">${i.isletme_adi}</div><div class="card-category"><i class="fas fa-tag"></i>${i.kategori}</div></div></div>
      <div class="card-badges">
        ${i.site_hazir ? '<span class="badge ready"><i class="fas fa-check"></i>Site Hazır</span>' : '<span class="badge not-ready"><i class="fas fa-times"></i>Hazır Değil</span>'}
        ${getDurumBadge(i)}
        ${i.telefon && i.telefon !== '-' ? '<span class="badge has-phone"><i class="fas fa-phone"></i>Telefon</span>' : ''}
      </div>
      <div class="card-meta"><span><i class="fas fa-camera"></i>${i.fotograf_sayisi} foto</span><span><i class="fas fa-star"></i>${i.yorum_sayisi} yorum</span>${i.fiyat ? `<span><i class="fas fa-lira-sign"></i>${i.fiyat}</span>` : ''}</div>
      ${i.adres ? `<div class="card-addr"><i class="fas fa-map-marker-alt"></i> ${i.adres}</div>` : ''}
    </div>`;
            }).join('');
            if (filteredData.length > 200) grid.innerHTML += `<div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--text2);font-size:13px"><i class="fas fa-info-circle"></i> ${filteredData.length - 200} isletme daha var.</div>`;
        }

        // ============ MODAL ============
        function openModal(id) {
            const i = DATA.isletmeler.find(x => x.id === id);
            if (!i) return;
            currentModalId = id;

            $('modalGallery').innerHTML = i.fotograflar.length > 0
                ? i.fotograflar.map(f => `<img src="${f}" alt="" loading="lazy" onclick="openImage('${f}')" onerror="this.style.display='none'">`).join('')
                : '<div style="padding:20px;text-align:center;color:var(--text2);grid-column:1/-1"><i class="fas fa-image" style="font-size:32px;margin-bottom:8px;display:block"></i>Fotograf yok</div>';

            let html = `<h2 class="modal-title">${i.isletme_adi}</h2><div class="modal-cat"><i class="fas fa-tag"></i>${i.kategori}</div>`;

            // EDIT FORM (only if API active)
            html += `<div class="edit-form">
    <div class="modal-section" style="margin-bottom:0"><h3><i class="fas fa-edit"></i>Yonetim${API_ACTIVE ? '' : ' <span style="color:var(--red);font-size:10px">(API gerekli)</span>'}</h3></div>
    <div class="edit-row">
      <div class="edit-field"><label>Durum</label>
        <select id="editDurum" ${API_ACTIVE ? '' : 'disabled'}><option value="">-- Sec --</option><option value="Takipte"${i.durum === 'Takipte' ? ' selected' : ''}>Takipte</option><option value="Fiyat Soruldu"${i.durum === 'Fiyat Soruldu' ? ' selected' : ''}>Fiyat Soruldu</option><option value="Ilgisiz"${i.durum === 'Ilgisiz' ? ' selected' : ''}>Ilgisiz</option><option value="Satildi"${i.durum === 'Satildi' ? ' selected' : ''}>Satildi</option></select></div>
      <div class="edit-field"><label>Fiyat (TL)</label><input type="text" id="editFiyat" value="${i.fiyat || ''}" placeholder="Ornegin: 2500" ${API_ACTIVE ? '' : 'disabled'}></div>
    </div>
    <div class="edit-row">
      <div class="edit-field"><label>Mesaj Durumu</label>
        <select id="editMesaj" ${API_ACTIVE ? '' : 'disabled'}><option value="">-- Sec --</option><option value="Gonderildi"${i.mesaj_durumu === 'Gonderildi' ? ' selected' : ''}>Gonderildi</option><option value="Bekleniyor"${i.mesaj_durumu === 'Bekleniyor' ? ' selected' : ''}>Bekleniyor</option><option value="Cevap Geldi"${i.mesaj_durumu === 'Cevap Geldi' ? ' selected' : ''}>Cevap Geldi</option></select></div>
      <div class="edit-field"><label>Oncelik</label>
        <select id="editOncelik" ${API_ACTIVE ? '' : 'disabled'}><option value="normal"${(i.oncelik || 'normal') === 'normal' ? ' selected' : ''}>Normal</option><option value="yuksek"${i.oncelik === 'yuksek' ? ' selected' : ''}>Yuksek</option><option value="dusuk"${i.oncelik === 'dusuk' ? ' selected' : ''}>Dusuk</option></select></div>
    </div>
    <div class="edit-field" style="margin-bottom:10px"><label>Notlar</label><textarea id="editNotlar" placeholder="Notlarinizi yazin..." ${API_ACTIVE ? '' : 'disabled'}>${i.notlar || ''}</textarea></div>
    <div style="display:flex;align-items:center">
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" id="editSatildi" ${i.satildi ? 'checked' : ''} ${API_ACTIVE ? '' : 'disabled'}> Satildi olarak isaretle</label>
    </div>
    ${API_ACTIVE ? `<div style="margin-top:12px"><button class="modal-btn save" onclick="saveChanges(${id})"><i class="fas fa-save"></i>Kaydet</button><span class="save-indicator" id="saveIndicator"><i class="fas fa-check"></i>Kaydedildi!</span></div>` : ''}
  </div>`;

            // Info grid
            html += `<div class="modal-section"><h3><i class="fas fa-info-circle"></i>Bilgiler</h3>
    <div class="modal-info-grid">
      <div class="modal-info-item"><label>Telefon</label>${i.telefon || '—'}</div>
      <div class="modal-info-item"><label>Adres</label>${i.adres || '—'}</div>
      ${i.web_sitesi_linki ? `<div class="modal-info-item"><label>Web</label><a href="${i.web_sitesi_linki}" target="_blank">${i.web_sitesi_linki}</a></div>` : ''}
      <div class="modal-info-item"><label>Foto/Yorum</label>${i.fotograf_sayisi} foto, ${i.yorum_sayisi} yorum</div>
      <div class="modal-info-item"><label>Site Durumu</label>${i.site_hazir ? '<span style="color:var(--green)">Hazir (' + i.deploy_slug + ')</span>' : '<span style="color:var(--red)">Hazir Degil</span>'}</div>
      <div class="modal-info-item"><label>Klasor</label><span style="font-size:11px;word-break:break-all">${i.klasor_yolu || ''}</span></div>
    </div></div>`;

            // Hours
            if (i.calisma_saatleri && i.calisma_saatleri.length > 0) {
                html += `<div class="modal-section"><h3><i class="fas fa-clock"></i>Calisma Saatleri</h3><div class="hours-grid">${i.calisma_saatleri.map(s => `<div class="hour-row"><span class="day">${s.gun}</span><span class="${s.saat === 'Kapalı' ? 'closed' : 'time'}">${s.saat}</span></div>`).join('')}</div></div>`;
            }

            // Reviews
            if (i.yorumlar && i.yorumlar.length > 0) {
                html += `<div class="modal-section"><h3><i class="fas fa-star"></i>Yorumlar</h3>${i.yorumlar.map(y => `<div class="review-card"><div class="review-header"><span class="review-author">${y.yazar || 'Anonim'}</span><span class="review-stars">${'★'.repeat(y.yildiz || 5)}</span></div><div class="review-text">${(y.metin || '').substring(0, 200)}</div></div>`).join('')}</div>`;
            }

            // Actions
            const tel = (i.telefon || '').replace(/\D/g, '');
            html += `<div class="modal-actions">
    ${tel ? `<a class="modal-btn whatsapp" href="https://wa.me/90${tel.startsWith('0') ? tel.slice(1) : tel}" target="_blank"><i class="fab fa-whatsapp"></i>WhatsApp</a><a class="modal-btn primary" href="tel:${i.telefon}"><i class="fas fa-phone"></i>Ara</a>` : ''}
    ${i.google_maps_url ? `<a class="modal-btn maps" href="${i.google_maps_url}" target="_blank"><i class="fas fa-map-marker-alt"></i>Harita</a>` : ''}
  </div>`;

            $('modalBody').innerHTML = html;
            $('modalOverlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        // ============ SAVE CHANGES ============
        async function saveChanges(id) {
            if (!API_ACTIVE) { showToast('API sunucu bagli degil!', true); return; }
            const payload = {
                durum: $('editDurum').value,
                fiyat: $('editFiyat').value,
                mesaj_durumu: $('editMesaj').value,
                oncelik: $('editOncelik').value,
                notlar: $('editNotlar').value,
                satildi: $('editSatildi').checked
            };
            try {
                const r = await fetch(API_URL + '/api/isletme/' + id, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const res = await r.json();
                if (res.basarili) {
                    showToast(res.mesaj || 'Kaydedildi!');
                    $('saveIndicator').classList.add('show');
                    setTimeout(() => $('saveIndicator').classList.remove('show'), 3000);
                    // Update local data
                    const item = DATA.isletmeler.find(x => x.id === id);
                    if (item) { Object.assign(item, payload); filterAndRender(); }
                    loadLogs();
                } else { showToast(res.hata || 'Hata!', true); }
            } catch (e) { showToast('Baglanti hatasi!', true); }
        }

        // ============ LOGS ============
        async function loadLogs() {
            if (!API_ACTIVE) return;
            try {
                const r = await fetch(API_URL + '/api/log');
                const logs = await r.json();
                if (logs.length === 0) { $('logEmpty').style.display = 'block'; return; }
                $('logEmpty').style.display = 'none';
                $('logList').innerHTML = logs.map(l => `<div class="log-item">
      <div class="log-icon update"><i class="fas fa-pen"></i></div>
      <div class="log-info"><div class="log-title">${l.isletme} — ${l.islem}</div><div class="log-detail">${l.detay || ''}</div></div>
      <div class="log-time">${l.tarih}</div>
    </div>`).join('');
            } catch (e) { }
        }

        // ============ HELPERS ============
        function showToast(msg, isError) {
            const t = $('toast'); t.textContent = msg; t.className = isError ? 'toast show error' : 'toast show';
            setTimeout(() => t.className = 'toast', 3000);
        }
        function closeModal() { $('modalOverlay').classList.remove('open'); document.body.style.overflow = ''; currentModalId = null; }
        function openImage(src) { $('imgViewerImg').src = src; $('imgViewer').classList.add('open'); }
        function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms) }; }

        // ============ EVENTS ============
        $('searchInput').addEventListener('input', debounce(filterAndRender, 250));
        $('categoryFilter').addEventListener('change', filterAndRender);
        $('statusFilter').addEventListener('change', filterAndRender);
        document.querySelectorAll('.view-btn').forEach(b => b.addEventListener('click', () => { document.querySelectorAll('.view-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); $('grid').className = b.dataset.view === 'list' ? 'grid list-view' : 'grid'; }));
        $('grid').addEventListener('click', e => { const c = e.target.closest('.card'); if (c) openModal(parseInt(c.dataset.id)); });
        $('modalOverlay').addEventListener('click', e => { if (e.target === $('modalOverlay')) closeModal(); });
        $('modalClose').addEventListener('click', closeModal);
        document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); $('imgViewer').classList.remove('open'); } });
        $('imgViewer').addEventListener('click', () => $('imgViewer').classList.remove('open'));

        // TAB SWITCHING
        document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active')); b.classList.add('active');
            const tab = b.dataset.tab;
            $('isletmePanel').className = tab === 'isletme' ? 'isletme-panel' : 'isletme-panel hidden';
            $('logPanel').className = tab === 'log' ? 'log-panel active' : 'log-panel';
            if (tab === 'log') loadLogs();
        }));

        // ============ THEME TOGGLE ============
        const themeToggle = $('themeToggle');
        const currentTheme = localStorage.getItem('theme') || 'dark';

        if (currentTheme === 'light') {
            document.documentElement.classList.add('light-theme');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        }

        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('light-theme');
            const isLight = document.documentElement.classList.contains('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            themeToggle.innerHTML = isLight ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        });

        // ============ INIT ============
        (async () => { await detectAPI(); await loadData(); })();
    </script>
</body>

</html>
